name: Python quality

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install lightweight test dependencies
        run: pip install numpy scipy osqp python-dotenv PyYAML ruff==0.15.22
      - name: Lint check
        run: ruff check .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile check
        run: python -m compileall -q carla_app main.py scripts tests
